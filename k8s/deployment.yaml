apiVersion: v1
kind: List
metadata:
resourceVersion: ""
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    namespace: ${NAMESPACE}
    name: ${DEPLOYMENT}
    labels:
      app: ${APP}
  spec:
    replicas: 3
    selector:
      matchLabels:
        app: ${APP}
    template:
      metadata:
        labels:
          app: ${APP}
      spec:
        containers:
        - name: ${APP}
          image: ${IMAGE}
          env:
            - name: RELEASE_VERSION
              value: "${RELEASE_VERSION}"
            - name: DT_GRAIL_QUERY_BUDGET_GB
              value: "${DT_GRAIL_QUERY_BUDGET_GB}"
            - name: DT_MCP_DISABLE_TELEMETRY
              value: "${DT_MCP_DISABLE_TELEMETRY}"
            - name: DT_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: dt-credentials
                  key: DT_ENVIRONMENT
            - name: DT_PLATFORM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dt-credentials
                  key: DT_PLATFORM_TOKEN
          ports:
          - containerPort: 3000
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: ${APP}
    name: ${DEPLOYMENT}-service
    namespace: ${NAMESPACE}
  spec:
    ports:
    - port: 3000
      protocol: TCP
      targetPort: 3000
    selector:
      app: ${APP}
    type: ClusterIP